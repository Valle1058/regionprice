name: Preise aktualisieren

# Laeuft automatisch alle 12 Stunden (00:00 und 12:00 UTC)
# und kann jederzeit manuell gestartet werden.
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # darf games.json committen

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Preise holen (alle Laender -> games.json)
        run: node fetch-prices.js

      - name: games.json committen (nur bei Aenderung)
        run: |
          git config user.name  "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add games.json games.js
          if git diff --staged --quiet; then
            echo "Keine Preisaenderungen."
          else
            git commit -m "chore: Preise aktualisiert ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
